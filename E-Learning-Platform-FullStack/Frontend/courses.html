<!--courses.html-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR -->
<header class="bg-dark text-white p-3 sticky-top">
  <div class="container">
    <nav class="d-flex justify-content-between">
      <h4>E-Learning</h4>
      <ul class="nav">
        <li class="nav-item"><a class="nav-link text-white" href="index.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link text-white active" href="courses.html">Courses</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="quiz.html">Quiz</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="profile.html">Profile</a></li>
        <li class="nav-item d-flex align-items-center">
          <span id="userName" class="text-white me-3"></span>
        </li>
        <li class="nav-item d-flex align-items-center">
          <button id="logoutBtn" class="btn btn-light btn-sm ms-2">Logout</button>
        </li>      
      </ul>
    </nav>
  </div>
</header>

<!-- BREADCRUMB -->
<nav class="container mt-3">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="index.html">Dashboard</a></li>
    <li class="breadcrumb-item active">Courses</li>
  </ol>
</nav>

<main class="container mt-4">

  <!-- TABLE -->
  <h3>Available Courses</h3>
  <table class="table table-striped">
    <thead>
      <tr>
        <th>Course Name</th>
        <th>Modules</th>
      </tr>
    </thead>
    <tbody id="courseTable"></tbody>
  </table>

  <!-- Loader -->
  <div id="courseLoader" class="text-center mt-4">
    <div class="spinner-border text-primary"></div>
    <p class="mt-2 text-muted">Loading courses...</p>
  </div>

  <!-- Cards -->
  <div class="row g-4 mt-4" id="courseCards"></div>

</main>

<script type="module" src="js/main.js"></script>
</body>
</html>
