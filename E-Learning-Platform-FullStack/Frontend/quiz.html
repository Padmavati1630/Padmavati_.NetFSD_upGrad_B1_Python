<!--quiz.html-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="bg-dark text-white p-3 sticky-top">
    <div class="container">
      <nav class="d-flex justify-content-between">
        <h4>E-Learning</h4>
        <ul class="nav">
          <li class="nav-item"><a class="nav-link text-white" href="index.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="courses.html">Courses</a></li>
          <li class="nav-item"><a class="nav-link text-white active" href="quiz.html">Quiz</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="profile.html">Profile</a></li>
          <li class="nav-item d-flex align-items-center">
            <span id="userName" class="text-white me-3"></span>
          </li>
          <li class="nav-item d-flex align-items-center">
            <button id="logoutBtn" class="btn btn-light btn-sm ms-2">Logout</button>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container mt-4">

    <h3>Assessment</h3>

    <!-- NEW LOADING -->
    <div id="loadingSpinner" class="text-center mt-5">
      <div class="spinner-border text-primary"></div>
      <p class="mt-2 text-muted">Preparing your quiz...</p>
    </div>

    <p id="timer" class="text-danger fw-bold"></p>

    <div id="quizContainer" class="mt-4"></div>

    <button id="submitQuiz" class="btn btn-primary mt-3">
      Submit Quiz
    </button>

    <section id="resultSection" class="mt-4 card p-3 shadow-sm" style="display:none">
      <h4>Quiz Result</h4>
      <p id="scoreText"></p>
      <p id="feedbackText"></p>
      <div id="answerReview"></div>
    </section>

  </main>

  <script type="module" src="js/quiz.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</body>
</html>
