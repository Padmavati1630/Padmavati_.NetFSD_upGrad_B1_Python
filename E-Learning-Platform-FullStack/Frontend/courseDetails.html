<!--courseDetails.html-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Details</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>


<header class="bg-dark text-white p-3 sticky-top">
  <div class="container">
    <nav class="d-flex justify-content-between">
      <h4>E-Learning</h4>
      <ul class="nav">
        <li class="nav-item"><a class="nav-link text-white" href="index.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link text-white active" href="courses.html">Courses</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="quiz.html">Quiz</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="profile.html">Profile</a></li>
        <li class="nav-item d-flex align-items-center">
          <span id="userName" class="text-white me-3"></span>
        </li>
        <li class="nav-item d-flex align-items-center">
          <button id="logoutBtn" class="btn btn-light btn-sm ms-2">Logout</button>
        </li>
      </ul>
    </nav>
  </div>
</header>

<!-- BREADCRUMB -->
<nav class="container mt-3">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="courses.html">Courses</a></li>
    <li class="breadcrumb-item active">Course Details</li>
  </ol>
</nav>

<main class="container mt-4">

  <div class="row">

    <!-- Left Side -->
    <div class="col-md-8">
      <div class="card glass-card p-4">

        <h3 id="courseTitle"></h3>
        <p class="text-muted" id="courseDesc"></p>

        <h5 class="mt-3">Curriculum</h5>

        <div id="curriculum"></div>

      </div>
    </div>

    <!-- Right Side -->
    <div class="col-md-4">
      <div class="card p-4 shadow-sm rounded-4 text-center">

        <h5>Progress</h5>
        <h1 id="progressPercent" class="text-primary">0%</h1>
        <p class="text-muted">Keep going!</p>

        <progress id="courseProgressBar" value="0" max="100"></progress>

        <button id="finalBtn" class="btn btn-primary w-100 mt-3" disabled>
            Take the quiz 
        </button>

      </div>
    </div>

  </div>

</main>

<script type="module" src="js/main.js"></script>
</body>
</html>
