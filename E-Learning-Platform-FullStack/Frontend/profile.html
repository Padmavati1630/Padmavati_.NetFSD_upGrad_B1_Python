<!--profile.html-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
  </head>

<body>

  <header class="bg-dark text-white p-3 sticky-top">
    <div class="container">
      <nav class="d-flex justify-content-between">
        <h4>E-Learning</h4>
        <ul class="nav">
          <li class="nav-item"><a class="nav-link text-white" href="index.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="courses.html">Courses</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="quiz.html">Quiz</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="profile.html">Profile</a></li>
            <li class="nav-item d-flex align-items-center">
              <span id="userName" class="text-white me-3"></span>
            </li>
          <li class="nav-item d-flex align-items-center">
            <button id="logoutBtn" class="btn btn-light btn-sm ms-2">Logout</button>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <nav class="container mt-3" aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item">
        <a href="index.html">Dashboard</a>
      </li>
      <li class="breadcrumb-item active" aria-current="page">
        Profile
      </li>
    </ol>
  </nav>

  <main class="container mt-4">

    <section class="card p-3 shadow-sm mb-3">
      <h3>Welcome, <span id="profileName"></span></h3>
      <p>Your learning progress and performance summary</p>
    </section>

    <div class="row g-4 mt-3">

      <div class="col-md-4">
        <div class="glass-card p-3 text-center">
          <h6>Best Score</h6>
          <h2 id="bestScore">-</h2>
        </div>
      </div>

      <div class="col-md-4">
        <div class="glass-card p-3 text-center">
          <h6>Attempts</h6>
          <h2 id="attemptCount">0</h2>
        </div>
      </div>

      <div class="col-md-4">
        <div class="glass-card p-3 text-center">
          <h6>Completion</h6>
          <h2 id="completion">0%</h2>
        </div>
      </div>

    </div>
    <br>
    <section class="card p-3 shadow-sm mb-3">
      <h5>Attempt History</h5>
      <ul id="attemptHistory"></ul>
    </section>

    <section class="card p-3 shadow-sm">
      <h5>Completed Courses</h5>
      <ul id="profileCourses"></ul>
    </section>

  </main>

  <div class="container">
    <button id="resetAll" class="btn btn-danger mt-3">
      Reset Progress
    </button>
  </div>

  <script type="module" src="js/main.js"></script>

</body>
</html>
