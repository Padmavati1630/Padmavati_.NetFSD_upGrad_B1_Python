<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width:400px;">
  <div class="card p-4 shadow-sm">

    <h3 id="formTitle" class="text-center mb-3">Login</h3>

    <!-- NAME (only for register) -->
    <input id="name" type="text" class="form-control mb-2" placeholder="Full Name" style="display:none;">

    <!-- COMMON -->
    <input id="email" type="email" class="form-control mb-2" placeholder="Email">
    <input id="password" type="password" class="form-control mb-3" placeholder="Password">

    <!-- BUTTON -->
    <button id="submitBtn" class="btn btn-primary w-100">Login</button>

    <!-- TOGGLE -->
    <p class="mt-3 text-center">
      <span id="toggleText">Don't have an account?</span>
      <a href="#" id="toggleLink">Register</a>
    </p>

  </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
